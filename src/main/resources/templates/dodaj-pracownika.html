<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Zarządzanie Kadrami | Dodaj Pracownika</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .header-section { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; padding: 40px 0; margin-bottom: 30px; border-radius: 0 0 25px 25px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .form-label { font-weight: bold; color: #333; }
        .hidden { display: none !important; }
        .btn-submit { background: #1e3c72; border: none; padding: 12px; transition: 0.3s; }
        .btn-submit:hover { background: #2a5298; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="header-section text-center">
    <div class="container">
        <h1><i class="fa-solid fa-user-plus me-2"></i> Panel Rejestracji Pracowników</h1>
        <p class="lead mb-0">Wprowadź dane nowego członka personelu linii lotniczej</p>
    </div>
</div>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card p-4 p-md-5">

                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="fa-solid fa-circle-check me-2"></i> <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fa-solid fa-circle-exclamation me-2"></i> <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <form th:action="@{/dodaj-pracownika}" th:object="${employeeForm}" method="post" novalidate>

                    <h4 class="mb-3 text-secondary border-bottom pb-2"><i class="fa-solid fa-address-card me-2"></i>Dane podstawowe</h4>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label for="firstName" class="form-label"><i class="fa-solid fa-user me-1 text-primary"></i> Imię</label>
                            <input type="text" th:field="*{firstName}" id="firstName" class="form-control" placeholder="np. Jan" required>
                        </div>
                        <div class="col-md-6">
                            <label for="lastName" class="form-label"><i class="fa-solid fa-user me-1 text-primary"></i> Nazwisko</label>
                            <input type="text" th:field="*{lastName}" id="lastName" class="form-control" placeholder="np. Kowalski" required>
                        </div>
                        <div class="col-md-6">
                            <label for="pesel" class="form-label"><i class="fa-solid fa-id-card me-1 text-primary"></i> PESEL</label>
                            <input type="text" th:field="*{pesel}" id="pesel" class="form-control" placeholder="11 cyfr" required>
                        </div>

                        <div class="col-md-6">
                            <label for="email" class="form-label"><i class="fa-solid fa-envelope me-1 text-primary"></i> Adres E-mail</label>
                            <input type="text" th:field="*{email}" id="email" class="form-control" placeholder="np. jan.kowalski@gfm.pl">
                        </div>

                        <div class="col-md-12">
                            <label for="role" class="form-label"><i class="fa-solid fa-briefcase me-1 text-primary"></i> Rola w systemie</label>
                            <select th:field="*{role}" id="role" class="form-select" onchange="toggleFields()" required>
                                <option value="" disabled selected>-- Wybierz stanowisko --</option>
                                <option value="ADMIN">Administrator</option>
                                <option value="DYSPOZYTOR">Dyspozytor</option>
                                <option value="PILOT">Pilot</option>
                                <option value="STEWARDESS">Stewardessa</option>
                                <option value="MECHANIC">Mechanik</option>
                            </select>
                        </div>
                    </div>

                    <div id="crewFields" class="hidden">
                        <h4 class="mb-3 text-secondary border-bottom pb-2"><i class="fa-solid fa-plane-arrival me-2"></i>Uprawnienia personelu latającego</h4>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label for="medExams" class="form-label"><i class="fa-solid fa-heartbeat me-1 text-danger"></i> Ważność badań medycznych</label>
                                <input type="date" th:field="*{medExams}" id="medExams" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label for="licenseDate" class="form-label"><i class="fa-solid fa-id-badge me-1 text-warning"></i> Ważność licencji personelu</label>
                                <input type="date" th:field="*{licenseDate}" id="licenseDate" class="form-control">
                            </div>
                        </div>
                    </div>

                    <div id="pilotSpecificFields" class="hidden">
                        <h4 class="mb-3 text-secondary border-bottom pb-2"><i class="fa-solid fa-sliders me-2"></i>Specyfikacja Pilota</h4>
                        <div class="row g-3 mb-4">
                            <div class="col-md-12">
                                <label for="allowedModels" class="form-label"><i class="fa-solid fa-plane text-success me-1"></i> Dopuszczone modele samolotów (oddziel przecinkami)</label>
                                <input type="text" th:field="*{allowedModels}" id="allowedModels" class="form-control" placeholder="np. Boeing 737, Airbus A320">
                            </div>
                        </div>
                    </div>

                    <div id="mechanicFields" class="hidden">
                        <h4 class="mb-3 text-secondary border-bottom pb-2"><i class="fa-solid fa-screwdriver-wrench me-2"></i>Uprawnienia techniczne</h4>
                        <div class="row g-3 mb-4">
                            <div class="col-md-12">
                                <label for="certNumber" class="form-label"><i class="fa-solid fa-certificate me-1 text-warning"></i> Numer Certyfikatu Licencji Mechanika (PART-66)</label>
                                <input type="text" th:field="*{certNumber}" id="certNumber" class="form-control" placeholder="np. PL.66.12345">
                            </div>
                        </div>
                    </div>

                    <div class="row mt-4">
                        <div class="col">
                            <button type="submit" class="btn btn-primary btn-submit w-100 text-white fw-bold shadow-sm">
                                <i class="fa-solid fa-floppy-disk me-2"></i> Zarejestruj pracownika w bazie
                            </button>
                        </div>
                    </div>
                </form>
            </div>

            <div class="text-center mt-5 mb-5">
                <a href="/logout" class="btn btn-danger px-4 shadow-sm">
                    <i class="fa-solid fa-right-from-bracket me-2"></i>Wyloguj się
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function toggleFields() {
        const role = document.getElementById('role').value;
        const crewFields = document.getElementById('crewFields');
        const mechanicFields = document.getElementById('mechanicFields');
        const pilotSpecificFields = document.getElementById('pilotSpecificFields');

        crewFields.classList.add('hidden');
        mechanicFields.classList.add('hidden');
        pilotSpecificFields.classList.add('hidden');

        if (role === 'PILOT' || role === 'STEWARDESS') {
            crewFields.classList.remove('hidden');
            if (role === 'PILOT') {
                pilotSpecificFields.classList.remove('hidden');
            }
        } else if (role === 'MECHANIC') {
            mechanicFields.classList.remove('hidden');
        }
    }
    document.addEventListener("DOMContentLoaded", function() {
        toggleFields();
    });
</script>
</body>
</html>
