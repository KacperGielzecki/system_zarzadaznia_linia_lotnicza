<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pl">
<head>
    <meta charset="UTF-8">
    <title>System Zarządzania Linią Lotniczą - Logowanie</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card p-4 shadow" style="width: 100%; max-width: 400px;">
        <h3 class="text-center mb-4">Logowanie do systemu</h3>

        <div th:if="${error}" class="alert alert-danger text-center" th:text="${error}"></div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="email" class="form-label">Adres e-mail:</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="np. jan.kowalski@gfm.pl" required>
            </div>
            <div class="mb-3">
                <label for="pesel" class="form-label">Numer PESEL:</label>
                <input type="password" id="pesel" name="pesel" class="form-control" placeholder="Wpisz swój PESEL" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Zaloguj się</button>
        </form>
    </div>
</div>
</body>
</html>
