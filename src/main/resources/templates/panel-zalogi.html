<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mój Grafik | Załoga</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .header-section { background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); color: white; padding: 40px 0; margin-bottom: 30px; border-radius: 0 0 25px 25px; }
        .flight-card { border: none; border-radius: 15px; border-left: 6px solid #6a11cb; transition: 0.3s; }
        .flight-card:hover { transform: scale(1.02); }
        .time-badge { background: #eee; padding: 5px 12px; border-radius: 8px; font-weight: bold; color: #444; }
        .status-box { min-height: 80px; }
        .ready-badge { background-color: #e7f3ff; color: #0d6efd; border: 1px dashed #0d6efd; }
    </style>
</head>
<body>

<div class="header-section shadow">
    <div class="container text-center">
        <h1><i class="fa-solid fa-clipboard-user me-3"></i>Twój Osobisty Grafik</h1>
        <p class="lead">Aktualne przypisania i powiadomienia o lotach</p>
    </div>
</div>

<div class="container">
    <div class="row">
        <div th:each="f : ${allFlights}" class="col-md-6 col-lg-4 mb-4">
            <div class="card flight-card shadow-sm h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <span class="time-badge">
                            <i class="fa-solid fa-clock me-1"></i>
                            <span th:text="${#temporals.format(f.departureTime, 'HH:mm')}"></span>
                        </span>
                        <span th:text="${#temporals.format(f.departureTime, 'dd.MM.yyyy')}" class="text-muted small"></span>
                    </div>

                    <h5 class="card-title text-primary">
                        <i class="fa-solid fa-plane-up me-2"></i>
                        <span th:text="${f.route}"></span>
                    </h5>
                    <p class="card-text mb-2 text-muted">
                        <i class="fa-solid fa-jet-fighter me-2"></i> Samolot:
                        <strong th:text="${f.airplane.model}"></strong>
                    </p>

                    <hr>

                    <!-- Statusy lotu -->
                    <div class="status-box">
                        <!-- STATUS PALIWA -->
                        <div th:if="${f.fuelApproved}" class="text-success small fw-bold mb-2">
                            <i class="fa-solid fa-circle-check me-1"></i> Paliwo zatwierdzone (Odczyt: <span th:text="${f.fuelFromSensors}"></span> L)
                        </div>
                        <div th:if="${!f.fuelApproved}" class="text-warning small fw-bold mb-2">
                            <i class="fa-solid fa-circle-pause me-1"></i> Oczekiwanie na serwis i tankowanie
                        </div>

                        <!-- ZATWIERDZANIE WYWAŻENIA (Etap 30.04) -->
                        <div th:if="${f.fuelApproved and !f.loadsheetAccepted}" class="mt-3">
                            <form th:action="@{/zatwierdz-wywazenie}" method="post">
                                <!-- KLUCZOWA POPRAWKA: nazwa pola musi być 'id' tak jak w @RequestParam w kontrolerze -->
                                <input type="hidden" name="id" th:value="${f.id}">
                                <button type="submit" class="btn btn-sm btn-primary w-100 shadow-sm">
                                    <i class="fa-solid fa-file-signature me-2"></i> Zatwierdź Arkusz Wyważenia
                                </button>
                            </form>
                        </div>

                        <!-- STATUS FINALNY -->
                        <div th:if="${f.loadsheetAccepted}" class="ready-badge text-center p-2 rounded mt-2 fw-bold">
                            <i class="fa-solid fa-plane-departure me-2"></i> GOTOWY DO KOŁOWANIA
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(allFlights)}" class="text-center py-5">
            <i class="fa-solid fa-calendar-day fa-4x text-muted mb-3"></i>
            <p class="lead text-muted">Brak lotów w Twoim grafiku na najbliższy czas.</p>
        </div>
    </div>

    <div class="text-center mt-4 mb-5">
        <a href="/kalendarz" class="btn btn-outline-secondary"><i class="fa-solid fa-house me-2"></i>Powrót do Kalendarza</a>
    </div>
</div>

</body>
</html>
