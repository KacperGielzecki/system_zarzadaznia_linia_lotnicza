<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel Stewardessy</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .header-section { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; padding: 40px 0; margin-bottom: 30px; border-radius: 0 0 25px 25px; }
        .flight-card { border: none; border-radius: 15px; border-left: 6px solid #11998e; transition: 0.3s; }
        .flight-card:hover { transform: scale(1.02); }
    </style>
</head>
<body>

<div class="header-section shadow">
    <div class="container text-center">
        <h1><i class="fa-solid fa-person-dress me-3"></i>Kontrola Kabiny</h1>
        <p class="lead">Weryfikacja przed lotem</p>
    </div>
</div>

<div class="container">
    <div class="row">
        <div th:each="f : ${flightsToVerify}" class="col-md-6 col-lg-4 mb-4">
            <div class="card flight-card shadow-sm h-100">
                <div class="card-body">
                    <h5 class="card-title text-success"><span th:text="${f.route}"></span></h5>
                    <p class="text-muted small">Godzina: <span th:text="${#temporals.format(f.departureTime, 'HH:mm')}"></span></p>

                    <form th:action="@{/stewardessa/zatwierdz}" method="post" class="mt-3">
                        <input type="hidden" name="flightId" th:value="${f.id}">

                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" name="passengersVerified" id="paxCheck" required>
                            <label class="form-check-label small" for="paxCheck">Liczba pasażerów zgadza się</label>
                        </div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" name="equipmentVerified" id="eqCheck" required>
                            <label class="form-check-label small" for="eqCheck">Sprzęt ratunkowy sprawny</label>
                        </div>

                        <button type="submit" class="btn btn-success w-100 shadow-sm">
                            <i class="fa-solid fa-check-double me-2"></i> Potwierdź gotowość kabiny
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(flightsToVerify)}" class="text-center py-5">
            <i class="fa-solid fa-check-circle fa-4x text-muted mb-3"></i>
            <p class="lead text-muted">Brak lotów wymagających kontroli kabiny.</p>
        </div>
    </div>

    <div class="text-center mt-5 mb-5">
        <a href="/logout" class="btn btn-danger px-4 shadow-sm">
            <i class="fa-solid fa-right-from-bracket me-2"></i>Wyloguj się
        </a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
