<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Zarządzanie Kadrami | Dodaj Pracownika</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .header-section { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; padding: 40px 0; margin-bottom: 30px; border-radius: 0 0 25px 25px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .form-label { font-weight: bold; color: #333; }
        .hidden { display: none !important; }
        .btn-submit { background: #1e3c72; border: none; padding: 12px; transition: 0.3s; }
        .btn-submit:hover { background: #152e5a; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="header-section shadow">
    <div class="container text-center">
        <h1><i class="fa-solid fa-user-plus me-3"></i>Nowy Pracownik Systemu</h1>
        <p class="lead">Rejestracja członków załogi, mechaników i administratorów</p>
    </div>
</div>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">

            <div class="alert alert-danger shadow-sm" th:if="${error}" th:text="${error}"></div>
            <div class="alert alert-success shadow-sm" th:if="${success}" th:text="${success}"></div>

            <div class="card p-4">
                <form th:action="@{/dodaj-pracownika}" th:object="${employeeForm}" method="post">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Imię</label>
                            <input type="text" class="form-control" th:field="*{firstName}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Nazwisko</label>
                            <input type="text" class="form-control" th:field="*{lastName}" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">PESEL</label>
                            <input type="text" class="form-control" th:field="*{pesel}" maxlength="11" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Rola w systemie</label>
                            <select id="role" class="form-select" th:field="*{role}" onchange="toggleFields()" required>
                                <option value="">-- Wybierz rolę --</option>
                                <option value="PILOT">Pilot</option>
                                <option value="STEWARDESS">Stewardesa</option>
                                <option value="MECHANIC">Mechanik</option>
                                <option value="ADMIN">Administrator</option>
                            </select>
                        </div>

                        <div id="crewFields" class="col-12 hidden">
                            <div class="card bg-light p-3 border-0 mt-2">
                                <h6 class="text-primary mb-3"><i class="fa-solid fa-id-card me-2"></i>Uprawnienia Lotnicze</h6>
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label small">Data ważności badań</label>
                                        <input type="date" class="form-control" th:field="*{medExams}">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label small">Ważność licencji</label>
                                        <input type="date" class="form-control" th:field="*{licenseDate}">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div id="mechanicFields" class="col-12 hidden">
                            <div class="card bg-light p-3 border-0 mt-2">
                                <h6 class="text-warning mb-3"><i class="fa-solid fa-certificate me-2"></i>Certyfikaty</h6>
                                <label class="form-label small">Numer certyfikatu mechanika</label>
                                <input type="text" class="form-control" th:field="*{certNumber}">
                            </div>
                        </div>

                        <div class="col-12 mt-4">
                            <button type="submit" class="btn btn-primary btn-submit w-100 text-white fw-bold shadow">
                                <i class="fa-solid fa-user-check me-2"></i>Zapisz i Utwórz Konto
                            </button>
                        </div>
                    </div>
                </form>
            </div>

            <div class="text-center mt-4">
                <a href="/kalendarz" class="text-muted text-decoration-none"><i class="fa-solid fa-arrow-left me-1"></i> Wróć do systemu</a>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleFields() {
        const role = document.getElementById('role').value;
        const crewFields = document.getElementById('crewFields');
        const mechanicFields = document.getElementById('mechanicFields');

        crewFields.classList.add('hidden');
        mechanicFields.classList.add('hidden');

        if (role === 'PILOT' || role === 'STEWARDESS') {
            crewFields.classList.remove('hidden');
        } else if (role === 'MECHANIC') {
            mechanicFields.classList.remove('hidden');
        }
    }
    document.addEventListener("DOMContentLoaded", toggleFields);
</script>

</body>
</html>
